include: package:lints/recommended.yaml

analyzer:
  exclude:
    - example/**
    - tool/**
    - test/e2e/**
  errors:
    missing_return: error
    dead_code: warning
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true

linter:
  rules:
    - avoid_dynamic_calls
    - avoid_print
    - cancel_subscriptions
    - close_sinks
    - prefer_final_fields
    - prefer_final_locals
    - unawaited_futures
    - unnecessary_await_in_return
