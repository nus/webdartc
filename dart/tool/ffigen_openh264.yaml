name: OpenH264Bindings
description: |
  Bindings for OpenH264 (Cisco's software H.264 encoder/decoder).
  Generated via: dart run ffigen --config tool/ffigen_openh264.yaml
output: '../lib/codec/h264/openh264_bindings.g.dart'
llvm-path:
  - '/usr/lib/llvm-18/lib'
headers:
  entry-points:
    - '/usr/include/wels/codec_api.h'
    - '/usr/include/wels/codec_app_def.h'
    - '/usr/include/wels/codec_def.h'
    - '/usr/include/wels/codec_ver.h'
  include-directives:
    - '/usr/include/wels/**'
compiler-opts:
  - '-x'
  - 'c'
  - '-I/usr/include'
  - '-include'
  - 'stdbool.h'
preamble: |
  // ignore_for_file: type=lint, type=warning, unused_field, unused_element, non_constant_identifier_names
  // Generated by ffigen. Do not edit manually.
functions:
  include:
    - 'Wels.*'
structs:
  include:
    - 'S.*'
    - 'ISVCEncoderVtbl'
    - 'ISVCDecoderVtbl'
enums:
  include:
    - 'E.*'
    - 'DECODING_STATE'
    - 'CM_RETURN'
    - 'ENCODER_OPTION'
    - 'DECODER_OPTION'
silence-enum-warning: true
comments:
  style: any
  length: brief
