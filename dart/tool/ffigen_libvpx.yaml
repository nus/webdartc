name: LibVpxBindings
description: |
  Bindings for libvpx (VP8 encoder/decoder).
  Generated via: dart run ffigen --config tool/ffigen_libvpx.yaml
output: '../lib/codec/vp8/libvpx_bindings.g.dart'
silence-enum-warning: true
llvm-path:
  - '/usr/lib/llvm-18/lib'
headers:
  entry-points:
    - '/usr/include/vpx/vpx_codec.h'
    - '/usr/include/vpx/vpx_encoder.h'
    - '/usr/include/vpx/vpx_decoder.h'
    - '/usr/include/vpx/vpx_image.h'
    - '/usr/include/vpx/vp8cx.h'
    - '/usr/include/vpx/vp8dx.h'
  include-directives:
    - '/usr/include/vpx/**'
compiler-opts:
  - '-I/usr/include'
preamble: |
  // ignore_for_file: type=lint, type=warning, unused_field, unused_element
  // Generated by ffigen. Do not edit manually.
functions:
  include:
    - 'vpx_codec_.*'
    - 'vpx_img_.*'
    - 'vpx_version.*'
structs:
  include:
    - 'vpx_.*'
unions:
  include:
    - 'vpx_.*'
enums:
  include:
    - 'vpx_.*'
    - 'vp8e_.*'
    - 'vp8_.*'
macros:
  include:
    - 'VPX_.*'
    - 'VP8E_.*'
    - 'VP8_.*'
comments:
  style: any
  length: brief
