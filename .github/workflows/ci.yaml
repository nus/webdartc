name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches: [main]

jobs:
  # ── dart (pure Dart) ──────────────────────────────────────────────────
  # Resolve the dart package standalone (drop root workspace pubspec + the
  # member's `resolution: workspace` line) so the Dart-only jobs don't need
  # Flutter.
  dart-analyze:
    name: dart / Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: '3.11.0'
      - name: Detach from workspace
        run: |
          rm -f pubspec.yaml
          sed -i '/^resolution: workspace$/d' dart/pubspec.yaml
      - working-directory: dart
        run: dart pub get
      - working-directory: dart
        run: dart analyze --fatal-infos

  dart-test-unit:
    name: dart / Unit Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: '3.11.0'
      - if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libssl-dev
      - name: Detach from workspace
        run: |
          rm -f pubspec.yaml
          sed -i '' -e '/^resolution: workspace$/d' dart/pubspec.yaml 2>/dev/null \
            || sed -i '/^resolution: workspace$/d' dart/pubspec.yaml
      - working-directory: dart
        run: dart pub get
      - working-directory: dart
        run: dart test --exclude-tags e2e --timeout=60s

  dart-test-e2e:
    name: dart / E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: '3.11.0'
      - run: sudo apt-get update && sudo apt-get install -y libssl-dev
      - name: Detach from workspace
        run: |
          rm -f pubspec.yaml
          sed -i '/^resolution: workspace$/d' dart/pubspec.yaml
      - working-directory: dart
        run: dart pub get
      - working-directory: dart
        run: dart test test/e2e/ --timeout=120s

  # ── flutter (Flutter) ─────────────────────────────────────────────────
  flutter-analyze:
    name: flutter / Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - working-directory: flutter
        run: flutter analyze --fatal-infos

  flutter-test:
    name: flutter / Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libssl-dev
      - run: flutter pub get
      - working-directory: flutter
        run: flutter test
